name: Update RSS Feed

on:
  schedule:
    - cron: "0 * * * *"   # stündlich
  workflow_dispatch:        # manueller Trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false        # eine Site schlägt fehl → andere laufen weiter
      matrix:
        site:
          - manager-magazin
          - handelsblatt       # weitere Sites hier einfach hinzufügen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper [${{ matrix.site }}]
        run: node scraper.js ${{ matrix.site }}

      - name: Commit feed [${{ matrix.site }}]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "feed-${{ matrix.site }}.xml"
          git diff --cached --quiet && echo "Keine Änderungen" && exit 0
          git commit -m "chore: update feed [${{ matrix.site }}] [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
