name: Update RSS Feed

on:
  schedule:
    - cron: "0 * * * *"   # stündlich
  workflow_dispatch:        # manueller Trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Schritt 1: Scraper ausführen ──
      - name: Run scraper
        id: scrape
        run: node scraper.js
        continue-on-error: true   # Fehler blockieren nicht den nächsten Schritt

      # ── Schritt 2: Self-heal wenn Exit-Code 2 (0 Artikel) ──
      - name: Self-heal parser
        if: steps.scrape.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "⚠️  Scraper fehlgeschlagen — starte Self-heal..."
          node self-heal.js

      # ── Schritt 3: Scraper nochmal ausführen nach Patch ──
      - name: Re-run scraper after heal
        if: steps.scrape.outcome == 'failure'
        run: node scraper.js

      # ── Schritt 4: Änderungen committen (feed.xml + ggf. gepatchtes scraper.js) ──
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml scraper.js
          git diff --cached --quiet && echo "Keine Änderungen" && exit 0
          if git diff --cached --name-only | grep -q "scraper.js"; then
            git commit -m "fix: auto-heal parser [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          else
            git commit -m "chore: update RSS feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          fi
          git push
