name: Update RSS Feed

on:
  schedule:
    # 06:30 CEST (= 05:30 CET im Winter) und 18:30 CEST (= 17:30 CET im Winter)
    - cron: "30 4,16 * * *"
  workflow_dispatch:        # manueller Trigger jederzeit

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false      # eine Site schlägt fehl → andere laufen weiter
      matrix:
        site:
          - manager-magazin
          - cnn-fear-greed
          - visualcapitalist
          - seekingalpha-notable-calls
          # weitere Sites hier einfach hinzufügen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Schritt 1: Scraper ausführen ──
      - name: Run scraper [${{ matrix.site }}]
        id: scrape
        run: node scraper.js ${{ matrix.site }}
        continue-on-error: true

      # ── Schritt 2: Self-heal wenn Exit-Code 2 (0 Artikel) ──
      #- name: Self-heal [${{ matrix.site }}]
      #  if: steps.scrape.outcome == 'failure'
      #  env:
      #    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #  run: |
      #    echo "⚠️ Parse fehlgeschlagen — starte Self-heal für ${{ matrix.site }}..."
      #    node self-heal.js ${{ matrix.site }}

      # ── Schritt 3: Scraper nochmal nach Patch ──
      #- name: Re-run scraper after heal [${{ matrix.site }}]
      #  if: steps.scrape.outcome == 'failure'
      #  run: node scraper.js ${{ matrix.site }}

      # ── Schritt 4: Commit & Push — robust für parallele Matrix-Jobs ──
      - name: Commit [${{ matrix.site }}]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Nur addieren was tatsächlich existiert (SVG gibts nur bei cnn-fear-greed)
          for f in "feed-${{ matrix.site }}.xml" "feed-${{ matrix.site }}.svg" "sites.json"; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && echo "Keine Änderungen" && exit 0
          if git diff --cached --name-only | grep -q "sites.json"; then
            MSG="fix: auto-heal [${{ matrix.site }}] [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          else
            MSG="chore: update feed [${{ matrix.site }}] [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          fi
          git commit -m "$MSG"
          # Pre-push rebase + retry: macht parallele Matrix-Pushes race-frei.
          # Jeder Job rebased seinen einen Commit auf den aktuellen remote-Stand,
          # bevor er pusht. Bei seltener Race zwischen pull und push: Retry.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || exit 1
            if git push; then
              exit 0
            fi
            echo "Push-Versuch $i fehlgeschlagen (Race) — sleep + retry..."
            sleep $((RANDOM % 3 + 1))
          done
          echo "Push nach 5 Versuchen weiterhin fehlgeschlagen"
          exit 1
