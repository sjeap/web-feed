name: Update RSS Feed

on:
  schedule:
    # 06:30 CEST (= 05:30 CET im Winter) und 18:30 CEST (= 17:30 CET im Winter)
    - cron: "30 4,16 * * *"
  workflow_dispatch:        # manueller Trigger jederzeit

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false      # eine Site schlägt fehl → andere laufen weiter
      matrix:
        site:
          - manager-magazin
          - cnn-fear-greed
          - visualcapitalist
          - seekingalpha-notable-calls

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── npm-Dependencies aus package.json (z.B. patchright) ──
      # Läuft für alle Jobs (~5s mit einer einzigen Dep). Kein package-lock.json
      # im Repo, daher 'npm install' statt 'npm ci'.
      - name: Install npm dependencies
        run: npm install

      # ── Chromium-Binary für patchright ──
      # Nur für Sites mit engine: "browser" in sites.json. Spart bei den anderen
      # Sites ~60s pro Run. --with-deps installiert nötige Ubuntu-System-Libs
      # (libnss3, libatk-bridge, etc.).
      - name: Install Chromium [${{ matrix.site }}]
        if: matrix.site == 'seekingalpha-notable-calls'
        run: npx patchright install --with-deps chromium

      # ── Schritt 1: Scraper ausführen ──
      - name: Run scraper [${{ matrix.site }}]
        id: scrape
        # Bricht NIE hart ab, sondern merkt sich nur den Exit-Code als Output
        # (0 = ok, 2 = 0 Artikel). Dadurch entsteht kein eigenes Fehler-
        # Annotation-Rauschen, und der Self-heal-Pfad bleibt möglich.
        run: |
          set +e
          node scraper.js ${{ matrix.site }}
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      # ── Schritt 2: Self-heal wenn Exit-Code != 0 (0 Artikel) ──
      #- name: Self-heal [${{ matrix.site }}]
      #  if: steps.scrape.outputs.code != '0'
      #  env:
      #    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #  run: |
      #    echo "⚠️ Parse fehlgeschlagen — starte Self-heal für ${{ matrix.site }}..."
      #    node self-heal.js ${{ matrix.site }}

      # ── Schritt 3: Scraper nochmal nach Patch (gleiche Code-Erfassung) ──
      #- name: Re-run scraper after heal [${{ matrix.site }}]
      #  id: rescrape
      #  if: steps.scrape.outputs.code != '0'
      #  run: |
      #    set +e
      #    node scraper.js ${{ matrix.site }}
      #    echo "code=$?" >> "$GITHUB_OUTPUT"
      #    exit 0

      # ── Schritt 4: Commit & Push — robust für parallele Matrix-Jobs ──
      - name: Commit [${{ matrix.site }}]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pfade aus sites.json lesen (Single Source of Truth) — damit
          # 'output' und 'gaugeOutput' beliebig konfiguriert werden können
          # (z.B. in einem assets/-Unterordner).
          SITE_ID="${{ matrix.site }}"
          OUT_XML=$(jq -r ".[] | select(.id==\"${SITE_ID}\") | .output // empty" sites.json)
          OUT_SVG=$(jq -r ".[] | select(.id==\"${SITE_ID}\") | .gaugeOutput // empty" sites.json)
          echo "Configured paths — xml: '$OUT_XML', svg: '$OUT_SVG'"
          # Nur addieren was tatsächlich existiert (SVG gibts nur bei cnn-fear-greed)
          for f in "$OUT_XML" "$OUT_SVG" "sites.json"; do
            [ -n "$f" ] && [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && echo "Keine Änderungen" && exit 0
          if git diff --cached --name-only | grep -q "sites.json"; then
            MSG="fix: auto-heal [${SITE_ID}] [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          else
            MSG="chore: update feed [${SITE_ID}] [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          fi
          git commit -m "$MSG"
          # Diagnose: zeig was nach dem Commit noch im Working Tree liegt
          # (erwartet: node_modules/, package-lock.json — vom npm-install-Step)
          echo "── working tree status nach commit ──"
          git status --short
          echo "────────────────────────────────────"
          # Pre-push rebase + retry: macht parallele Matrix-Pushes race-frei.
          # --autostash schluckt unstaged Änderungen (node_modules/, lock-file,
          # File-Mode-Drift, Line-Endings) automatisch.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || exit 1
            if git push; then
              exit 0
            fi
            echo "Push-Versuch $i fehlgeschlagen (Race) — sleep + retry..."
            sleep $((RANDOM % 3 + 1))
          done
          echo "Push nach 5 Versuchen weiterhin fehlgeschlagen"
          exit 1

      # ── Schritt 5: Soft-Signal — markiert 0 Artikel als WARNUNG, ohne den
      # Job fehlschlagen zu lassen. Liest den Exit-Code des (ggf. geheilten)
      # Scrapes aus dem Step-Output. Bewusst KEIN 'exit 1' → der Lauf bleibt
      # grün (keine Fehler-Mail, kein rotes X); die gelbe '::warning::'-
      # Annotation ist im Actions-Tab sichtbar, falls man reinschaut. Maßgeblich
      # ist der Re-Run (rescrape), sobald Schritt 2+3 aktiviert sind — sonst der
      # erste Scrape.
      - name: Warn on empty scrape [${{ matrix.site }}]
        if: always()
        run: |
          CODE="${{ steps.rescrape.outputs.code || steps.scrape.outputs.code }}"
          if [ -n "$CODE" ] && [ "$CODE" != "0" ]; then
            echo "::warning title=Scrape fehlgeschlagen::[${{ matrix.site }}] 0 Artikel (Exit $CODE) - Feed NICHT aktualisiert, bestehender Feed bleibt unveraendert."
          else
            echo "OK [${{ matrix.site }}] Scrape erfolgreich - Feed aktualisiert oder unveraendert."
          fi

  # ── Eigener Job: README aus ACKNOWLEDGMENTS.md zusammensetzen ──
  # Läuft EINMAL nach allen Matrix-Jobs (needs: scrape). 'if: always()' sorgt
  # dafür, dass er auch dann läuft, wenn einzelne Scraper-Jobs fehlschlagen.
  # ACKNOWLEDGMENTS.md ist die Single Source of Truth; README wird nur
  # committet, wenn sich zwischen den Markern wirklich etwas geändert hat.
  sync-readme:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: README mit Acknowledgments aktualisieren
        run: |
          node -e '
            const fs = require("fs");
            const ack = fs.readFileSync("ACKNOWLEDGMENTS.md", "utf8").trim();
            let readme = fs.readFileSync("README.md", "utf8");
            const block = "<!-- ACKNOWLEDGMENTS:START -->\n" + ack + "\n<!-- ACKNOWLEDGMENTS:END -->";
            if (!/<!-- ACKNOWLEDGMENTS:START -->[\s\S]*<!-- ACKNOWLEDGMENTS:END -->/.test(readme)) {
              console.error("Marker im README nicht gefunden — Abbruch.");
              process.exit(1);
            }
            readme = readme.replace(/<!-- ACKNOWLEDGMENTS:START -->[\s\S]*<!-- ACKNOWLEDGMENTS:END -->/, block);
            fs.writeFileSync("README.md", readme);
          '

      # ── OPML-Backup-Tabelle aus backups/twine_backup.opml neu erzeugen ──
      # Bei jedem Run: OPML parsen, Markdown-Tabelle zwischen den OPML-Markern
      # ersetzen. Ändert sich die OPML (neue/entfernte Feeds), erzeugt das einen
      # Diff → der Commit-Step unten pusht ihn. Fehlt die Datei, wird übersprungen.
      - name: README mit OPML-Backup aktualisieren
        run: |
          node -e '
            const fs = require("fs");
            const file = "backups/twine_backup.opml";
            const S = "<!-- OPML:START -->", E = "<!-- OPML:END -->";
            let readme = fs.readFileSync("README.md", "utf8");
            if (!readme.includes(S) || !readme.includes(E)) {
              console.error("OPML-Marker im README nicht gefunden — Abbruch.");
              process.exit(1);
            }
            if (!fs.existsSync(file)) {
              console.log("Keine OPML unter " + file + " — uebersprungen.");
              process.exit(0);
            }
            const dec = s => s.replace(/&amp;/g,"&").replace(/&lt;/g,"<")
              .replace(/&gt;/g,">").replace(/&quot;/g,"\"").replace(/&#39;/g,"\x27").replace(/&apos;/g,"\x27");
            const opml = fs.readFileSync(file, "utf8");
            const rows = [];
            for (const line of opml.split(/\r?\n/)) {
              const u = line.match(/xmlUrl="([^"]+)"/);
              if (!u) continue;
              const t = line.match(/\btitle="([^"]*)"/) || line.match(/\btext="([^"]*)"/);
              const url = dec(u[1]);
              const title = dec(t ? t[1] : url);
              const star = url.includes("sjeap.github.io/web-feed/") ? " \u2B50" : "";
              rows.push("- [" + title + "](" + url + ")" + star);
            }
            const list = rows.join("\n");
            readme = readme.replace(/<!-- OPML:START -->[\s\S]*<!-- OPML:END -->/, () => S + "\n" + list + "\n" + E);
            fs.writeFileSync("README.md", readme);
            console.log("OPML-Tabelle aktualisiert (" + rows.length + " Feeds).");
          '

      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "Keine README-Änderungen" && exit 0
          git commit -m "docs: sync acknowledgments + opml into README [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # gleiche race-freie Push-Logik wie bei den Matrix-Jobs
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || exit 1
            if git push; then
              exit 0
            fi
            echo "Push-Versuch $i fehlgeschlagen (Race) — sleep + retry..."
            sleep $((RANDOM % 3 + 1))
          done
          echo "Push nach 5 Versuchen weiterhin fehlgeschlagen"
          exit 1
